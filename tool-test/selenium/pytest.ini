[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --json-report
    --json-report-file=reports/report.json
    -p no:warnings

# Custom markers
markers =
    ui:          UI / layout tests
    validation:  Input validation tests
    function:    Functional / feature tests
    business:    Business flow / scenario tests
    database:    Database verification tests
    security:    Security / access control tests
    performance: Performance / NFR tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %H:%M:%S

# Timeouts (requires pytest-timeout if installed)
# timeout = 60
