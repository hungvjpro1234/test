# Base URL
protocol=http
host=localhost
port=5000
basePath=/api

# CSV sources
usersCsv=./test-data/perf_users.csv
adminUsersCsv=./test-data/perf_admin_users.csv
idsCsv=./test-data/perf_ids.csv

# Fallback auth data (used if CSV values are not supplied)
loginEmail=performance.user@test.com
loginPassword=Abc@1234
adminLoginEmail=system.admin@test.com
adminLoginPassword=Abc@1234

# Static fallback ids (replace by CSV/Extractor in real tests)
groupId=1
taskId=1
conversationId=1
notificationId=1

# Common params
page=1
limit=20
chatLimit=50
searchKeyword=urgent
chatMessagePrefix=Perf test message

# Thread Group load profile
tg.auth.threads=50
tg.auth.ramp=60
tg.auth.duration=300

tg.taskread.threads=120
tg.taskread.ramp=90
tg.taskread.duration=600

tg.taskwrite.threads=60
tg.taskwrite.ramp=60
tg.taskwrite.duration=600

tg.group.threads=100
tg.group.ramp=60
tg.group.duration=480

tg.notification.threads=120
tg.notification.ramp=90
tg.notification.duration=600

tg.chat.threads=120
tg.chat.ramp=90
tg.chat.duration=600

tg.admin.threads=40
tg.admin.ramp=45
tg.admin.duration=360

# Threshold (ms)
threshold.default=3000
threshold.fast=2000
threshold.heavy=3500
